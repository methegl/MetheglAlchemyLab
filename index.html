<!DOCTYPE html>

      color: gold;
    }

    .grid {
      display: grid;
      gap: 16px;

      border-radius: 16px;
      padding: 16px;
    }

    .card h3 {

      color: gold;
    }

    .links a {
      display: block;
      margin-bottom: 10px;
      padding: 10px;
      border: 1px solid #333;
      border-radius: 10px;
      text-decoration: none;
      color: #fff;
    }

    .links a:hover {
      border-color: gold;
      color: gold;
    }

</head>
<body>

<div class="container">

    <div class="card">

  </div>

  <h2>🔗 リンク</h2>
  <div class="links">

</div>

</html>
